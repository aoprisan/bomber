<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05060d"/>
      <stop offset="1" stop-color="#0a1024"/>
    </linearGradient>
    <radialGradient id="light" cx="0.5" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#fff4c2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fff4c2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <circle cx="256" cy="150" r="150" fill="url(#light)"/>
  <!-- searchlight cone -->
  <path d="M256 470 L150 150 L362 150 Z" fill="#fff4c2" opacity="0.10"/>
  <!-- bomber silhouette (nose up) -->
  <g fill="#d7e0f5" transform="translate(256 250)">
    <polygon points="0,-70 20,-18 20,30 10,60 -10,60 -20,30 -20,-18"/>
    <polygon points="-84,6 84,6 52,32 -52,32"/>
    <polygon points="-38,52 38,52 22,70 -22,70"/>
  </g>
  <circle cx="256" cy="222" r="8" fill="#7cd0ff"/>
  <!-- orange blast spark -->
  <circle cx="392" cy="392" r="26" fill="#ff8a2b" opacity="0.9"/>
  <circle cx="392" cy="392" r="12" fill="#ffd27a"/>
</svg>
